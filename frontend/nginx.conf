server {
    listen 80;
    server_name _;

    # Set the root directory for your static files
    root /usr/share/nginx/html;

    # Specify the default file to serve
    index index.html;

    location / {
        # This is the key part for React Router
        # Try to serve the requested file, then try it as a directory,
        # and finally, fall back to serving index.html
        try_files $uri $uri/ /index.html;
    }
}